<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>toaster demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(251, 191, 36, 0.25), transparent 32%),
          radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 28%),
          #f8fafc;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #0f172a;
      }
      .panel {
        width: min(720px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }
      p {
        margin: 0 0 20px;
        color: #475467;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }
      .grid button {
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        font: inherit;
        color: white;
        background: #111827;
        cursor: pointer;
      }
      .grid button:nth-child(2) { background: #b42318; }
      .grid button:nth-child(3) { background: #175cd3; }
      .grid button:nth-child(4) { background: #b54708; }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>toaster</h1>
      <p>Dependency-free toast notifications for websites. Try the variants below.</p>
      <div class="grid">
        <button id="success">Success</button>
        <button id="error">Error</button>
        <button id="info">Info</button>
        <button id="warning">Warning</button>
      </div>
    </div>

    <script src="../dist/toaster.js"></script>
    <script>
      const demoToaster = Toaster.createToaster({ position: "top-right" });

      document.getElementById("success").addEventListener("click", () => {
        demoToaster.success("Thread updated successfully.");
      });
      document.getElementById("error").addEventListener("click", () => {
        demoToaster.error("We could not save your changes.", { position: "bottom-right" });
      });
      document.getElementById("info").addEventListener("click", () => {
        demoToaster.info("A new version is available.", { position: "top-left" });
      });
      document.getElementById("warning").addEventListener("click", () => {
        demoToaster.warning("Your session expires soon.", {
          position: "bottom-left",
          duration: 0
        });
      });
    </script>
  </body>
</html>
